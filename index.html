<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zafrul Hasan Zishan | Web Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0d1b2a;color:#fff;overflow-x:hidden}

/* Background */
.parallax-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background: linear-gradient(-45deg,#4f46e5,#0d6efd,#9333ea,#14b8a6);
  background-size:400% 400%;
  animation:gradientMove 20s ease infinite;
  z-index:-2;
}
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.parallax-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.5);
  z-index:-1;
}

/* Hero */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 8%;
  position:relative;
}

.hero-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  max-width:1200px;
}

/* Profile Image */
.hero img{
  width:240px;
  height:240px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,0.8);
  box-shadow:0 25px 60px rgba(0,0,0,.5);
  transition:.5s;
}
.hero img:hover{
  transform:scale(1.05);
}

/* Text Side */
.hero-text{
  max-width:600px;
}

.hero-text h1{
  font-size:4rem;
  font-weight:800;
  line-height:1.1;
}

.hero-text span{
  color:#ffdd57;
}

.hero-text p{
  font-size:1.8rem;
  margin:20px 0;
  color:#e2e8f0;
}

/* Buttons */
.btns{
  display:flex;
  gap:20px;
  margin-top:30px;
}

.btn{
  padding:15px 35px;
  border-radius:50px;
  font-weight:600;
  text-decoration:none;
  transition:.4s;
  display:inline-block;
}

.btn.primary{
  background:linear-gradient(135deg,#4f46e5,#0d6efd);
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}
.btn.primary:hover{
  transform:translateY(-5px);
}

.btn.outline{
  border:2px solid #fff;
  color:#fff;
}
.btn.outline:hover{
  background:#fff;
  color:#0d6efd;
}

/* Mobile */
@media(max-width:900px){
  .hero-content{
    flex-direction:column;
    text-align:center;
  }
  .hero img{
    margin-bottom:40px;
  }
}
</style>
</head>

<body>

<div class="parallax-bg"></div>
<div class="parallax-overlay"></div>

<section class="hero">
<div id="particles-js"></div>

<div class="hero-content">

  <!-- LEFT SIDE IMAGE -->
  <img src="https://iili.io/qdH3PTu.jpg" alt="Zafrul Hasan Zishan">

  <!-- RIGHT SIDE TEXT -->
  <div class="hero-text">
    <h1>Zafrul Hasan <br><span>Zishan</span></h1>
    <p><span id="typed"></span></p>

    <div class="btns">
      <a href="Zishan-CV.pdf" download class="btn primary">Download CV</a>
      <a href="https://www.youtube.com/@zafrulhasanzishan" target="_blank" class="btn outline">YouTube</a>
    </div>
  </div>

</div>
</section>

<script>
var typed = new Typed('#typed',{
  strings:["React Developer","Front-end Specialist","Freelancer","UI/UX Designer"],
  typeSpeed:60,
  backSpeed:40,
  loop:true
});

particlesJS("particles-js",{
  particles:{
    number:{value:80},
    color:{value:["#ffdd57","#4ade80","#9333ea"]},
    size:{value:4,random:true},
    move:{enable:true,speed:2}
  }
});
</script>

</body>
</html>
